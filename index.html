<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>My Calendar</title>
    <style>
        body { font-family: sans-serif; background: #f9f9f9; padding: 10px; }
        .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; border: 1px solid #ccc; background: #ccc; }
        .day { background: white; min-height: 80px; padding: 5px; }
        .btn { padding: 10px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h2 id="monthTitle">我的行事曆</h2>
    <div class="calendar" id="calendar"></div>
    <script>
        const el = document.getElementById('calendar');
        for(let i=1; i<=31; i++) {
            el.innerHTML += `<div class="day">日期 ${i}</div>`;
        }
    </script>
</body>
</html>
