<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的專屬行事曆</title>
    <style>
        :root {
            --sat-color: #5b9bd5;
            --sun-color: #ed7d31;
            --bg-color: #f0f0f0;
            --border-color: #ccc;
        }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 0; background-color: var(--bg-color); user-select: none; color: #333; }
        
        /* 頂部月份控制 */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: white; }
        .header button { background: none; border: none; font-size: 22px; color: #666; cursor: pointer; padding: 5px 10px; }
        .header h2 { margin: 0; font-size: 22px; font-weight: bold; color: #444; letter-spacing: 1px; }
        
        /* 星期標題 */
        .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); background: #9e9e9e; color: white; text-align: center; font-size: 13px; font-weight: bold; }
        .weekdays div { padding: 6px 0; }
        .weekdays div:nth-child(6) { background: var(--sat-color); } /* 週六 */
        .weekdays div:nth-child(7) { background: #d98282; } /* 週日用柔和紅 */
        
        /* 月曆網格 */
        .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--border-color); border-bottom: 1px solid var(--border-color); }
        .day { background: white; min-height: 95px; padding: 2px; display: flex; flex-direction: column; cursor: pointer; transition: background 0.1s; }
        .day:active { background: #e8e8e8; }
        .day.empty { background: #f9f9f9; }
        
        /* 日期數字 */
        .date-number { font-size: 13px; font-weight: bold; margin-bottom: 3px; margin-left: 2px; color: #555; }
        .sat-text { color: var(--sat-color); }
        .sun-text { color: #d9534f; }
        
        /* 班表與行程樣式 */
        .shift-normal { background: white; border: 1px solid #aaa; font-size: 12px; font-weight: bold; text-align: left; padding: 1px 3px; margin-bottom: 3px; color: #333; box-sizing: border-box; width: 100%; white-space: nowrap; overflow: hidden; }
        .shift-off { background: #a28cdb; color: white; border: none; border-radius: 12px; font-size: 12px; font-weight: bold; text-align: center; width: fit-content; padding: 2px 8px; margin: 2px auto 4px auto; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .event-item { font-size: 11px; background: #e8f4fd; border-left: 3px solid #5b9bd5; padding: 3px 4px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #225588; border-radius: 0 3px 3px 0; }
        
        /* 編輯彈出視窗 (現代化卡片設計) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); justify-content: center; align-items: center; z-index: 10; backdrop-filter: blur(2px); }
        .modal-content { background: white; padding: 25px 20px; width: 88%; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); box-sizing: border-box; }
        .modal h3 { margin-top: 0; margin-bottom: 20px; font-size: 18px; color: #333; text-align: center; font-weight: bold; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .input-group { margin-bottom: 18px; }
        .input-group label { display: block; font-size: 13px; margin-bottom: 6px; font-weight: bold; color: #666; }
        .input-group input { width: 100%; padding: 12px; font-size: 16px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; background: #fafafa; transition: border 0.2s; }
        .input-group input:focus { outline: none; border-color: #5b9bd5; background: white; }
        .btn-row { display: flex; gap: 12px; margin-top: 5px; }
        .btn { flex: 1; padding: 14px; font-size: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-save { background: #4a90e2; color: white; box-shadow: 0 2px 5px rgba(74, 144, 226, 0.3); }
        .btn-cancel { background: #f1f1f1; color: #555; }
    </style>
</head>
<body>

    <div class="header">
        <button onclick="changeMonth(-1)">&#10094;</button>
        <h2 id="monthYear"></h2>
        <button onclick="changeMonth(1)">&#10095;</button>
    </div>

    <div class="weekdays">
        <div>週一</div><div>週二</div><div>週三</div><div>週四</div><div>週五</div><div>週六</div><div>週日</div>
    </div>

    <div class="calendar" id="calendar"></div>

    <div class="modal" id="editModal">
        <div class="modal-content">
            <h3 id="modalTitle"></h3>
            <div class="input-group">
                <label>班別 (如: D5, 12N, OFF)</label>
                <input type="text" id="shiftInput" placeholder="輸入班別代號">
            </div>
            <div class="input-group">
                <label>行程 / 記事</label>
                <input type="text" id="eventInput" placeholder="例如: 洗車、聚餐">
            </div>
            <div class="btn-row">
                <button class="btn btn-cancel" onclick="closeModal()">取消</button>
                <button class="btn btn-save" onclick="saveData()">儲存</button>
            </div>
        </div>
    </div>

    <script>
        let currentDate = new Date();
        let selectedDateString = "";
        let calendarData = JSON.parse(localStorage.getItem('myCustomCalendar')) || {};

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            document.getElementById('monthYear').innerText = `${year}年 ${month + 1}月`;
            
            const calendarEl = document.getElementById('calendar');
            calendarEl.innerHTML = "";

            let firstDay = new Date(year, month, 1).getDay();
            firstDay = firstDay === 0 ? 6 : firstDay - 1;
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            for (let i = 0; i < firstDay; i++) {
                calendarEl.innerHTML += `<div class="day empty"></div>`;
            }

            for (let i = 1; i <= daysInMonth; i++) {
                const dateKey = `${year}-${month + 1}-${i}`;
                const dayOfWeek = new Date(year, month, i).getDay();
                
                let dateClass = "date-number";
                if (dayOfWeek === 0) dateClass += " sun-text";
                if (dayOfWeek === 6) dateClass += " sat-text";

                const data = calendarData[dateKey] || { shift: "", event: "" };
                
                let shiftHtml = "";
                if (data.shift) {
                    if (data.shift.trim().toUpperCase() === "OFF") {
                        shiftHtml = `<div class="shift-off">OFF</div>`;
                    } else {
                        shiftHtml = `<div class="shift-normal">${data.shift}</div>`;
                    }
                }

                let eventHtml = data.event ? `<div class="event-item">${data.event}</div>` : "";

                calendarEl.innerHTML += `
                    <div class="day" onclick="openModal('${dateKey}', '${year}年${month + 1}月${i}日')">
                        <div class="${dateClass}">${i}</div>
                        ${shiftHtml}
                        ${eventHtml}
                    </div>
                `;
            }
        }

        function changeMonth(step) {
            currentDate.setMonth(currentDate.getMonth() + step);
            renderCalendar();
        }

        function openModal(dateKey, displayDate) {
            selectedDateString = dateKey;
            document.getElementById('modalTitle').innerText = displayDate;
            const data = calendarData[dateKey] || { shift: "", event: "" };
            document.getElementById('shiftInput').value = data.shift;
            document.getElementById('eventInput').value = data.event;
            document.getElementById('editModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        function saveData() {
            const shift = document.getElementById('shiftInput').value.trim();
            const event = document.getElementById('eventInput').value.trim();
            
            if (!shift && !event) {
                delete calendarData[selectedDateString];
            } else {
                calendarData[selectedDateString] = { shift, event };
            }
            
            localStorage.setItem('myCustomCalendar', JSON.stringify(calendarData));
            closeModal();
            renderCalendar();
        }

        renderCalendar();
    </script>
</body>
</html>
