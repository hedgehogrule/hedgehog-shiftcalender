<script>
    // ... (前段代碼維持不變，僅調整 openModal 與快捷鍵部分)

    // 新增：換班快速備註函數
    function addExchangeNote(name) {
        const eventInput = document.getElementById('eventInput');
        eventInput.value = `與 ${name} 換班`;
    }

    function openModal(key, disp, y, m, d) {
        selectedDateString = key; 
        document.getElementById('modalTitle').innerText = disp;
        const s = calendarData[key]||{}, a = getAuto(y, m, d);
        document.getElementById('modalSubtitle').innerText = `原排定: ${a.shift} | 輪值第 ${a.weekNumber} 週`;
        document.getElementById('shiftInput').value = s.shift !== undefined ? s.shift : a.shift;
        document.getElementById('eventInput').value = s.event||'';
        
        // 渲染班別快捷鍵
        const btnContainer = document.getElementById('btnContainer'); 
        btnContainer.innerHTML = '<div style="margin-bottom:5px; font-size:11px; color:#888;">選班別:</div>';
        allShifts.forEach(s => { 
            const b = document.createElement('button'); 
            b.className = 'quick-btn'; b.innerText = s; 
            b.onclick = () => setShift(s); 
            btnContainer.appendChild(b); 
        });

        // 新增：換班快捷鍵 (此處可改為你常換班的同事名字)
        btnContainer.innerHTML += '<div style="margin:10px 0 5px 0; font-size:11px; color:#888;">快速備註換班對象:</div>';
        ['同事A', '同事B', '同事C'].forEach(name => {
            const b = document.createElement('button');
            b.className = 'quick-btn'; b.style.background = '#e1f5fe'; b.innerText = name;
            b.onclick = () => addExchangeNote(name);
            btnContainer.appendChild(b);
        });
        
        document.getElementById('editModal').style.display = 'flex';
    }
    // ... (其餘儲存與渲染函數維持不變)
</script>
